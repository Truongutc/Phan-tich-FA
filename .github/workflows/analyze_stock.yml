name: Stock Analysis and Report Pipeline

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Nhập mã cổ phiếu cần phân tích (ví dụ: HPG, TCB, SSI, VAB, GMD...)'
        required: true
        default: 'TCB'
      force_regenerate:
        description: 'Tạo lại script phân tích dù đã có sẵn? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core tesseract-ocr
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "opendataloader-pdf[hybrid]"

      - name: Check Build Status
        id: check_build
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          BUILDER="build_${TICKER,,}_model.py"
          # Danh sách ticker có custom builder thủ công — tuyệt đối không xoá
          CUSTOM_TICKERS="HPG MBB VCB BID ACB CTG MWG"
          IS_CUSTOM=false
          for t in $CUSTOM_TICKERS; do
            if [ "${TICKER,,}" = "${t,,}" ]; then IS_CUSTOM=true; break; fi
          done
          if [ -f "$BUILDER" ]; then
            LINES=$(wc -l < "$BUILDER")
            echo "Found $BUILDER with $LINES lines"
            if [ "$IS_CUSTOM" = true ]; then
              echo "CUSTOM_BUILDER=true" >> "$GITHUB_ENV"
              echo "Custom builder detected — skipping Gemini, running directly."
            elif [ "$LINES" -gt 500 ]; then
              echo "CUSTOM_BUILDER=true" >> "$GITHUB_ENV"
              echo "Large builder (>500 lines) — protected, running directly."
            else
              echo "GENERATED_BUILDER=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Force Regenerate Generated Builder (only if <500 lines, not in custom list)
        if: ${{ env.GENERATED_BUILDER == 'true' && github.event.inputs.force_regenerate == 'true' }}
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          BUILDER="build_${TICKER,,}_model.py"
          echo "Deleting $BUILDER for regeneration..."
          rm -f "$BUILDER"

      - name: Start Hybrid PDF Server & Run Financial Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_WEBAPP_URL: ${{ secrets.GDRIVE_WEBAPP_URL }}
        run: |
          # Khởi động hybrid server ngầm và đợi 5s cho server sẵn sàng
          opendataloader-pdf-hybrid --port 5002 &
          sleep 5
          python run_analysis.py "${{ github.event.inputs.ticker }}"

      - name: Commit Generated Files Back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage: auto-generated builder script + data JSON
          TICKER="${{ github.event.inputs.ticker }}"
          BUILDER="build_${TICKER,,}_model.py"
          
          git add data/ || true
          git add "$BUILDER" 2>/dev/null || true
          
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-analysis: ${{ github.event.inputs.ticker }} — $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed."
          fi
