name: Stock Analysis and Report Pipeline

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Nhập mã cổ phiếu cần phân tích (ví dụ: HPG, TCB, SSI, VAB, GMD...)'
        required: true
        default: 'TCB'
      recalculate_fresh:
        description: 'Tính toán lại mới hoàn toàn (bỏ qua phân tích cũ)? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Giữ 90 phút CHỦ Ý — nếu 1 lần chạy vượt mức này, đó là dấu hiệu hệ thống đang OCR/tải quá
    # nhiều một cách không cần thiết (cần sửa logic, xem check_segment_consistency trong
    # template_kcn.py), không phải lý do để nới timeout che giấu vấn đề hiệu năng.
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fonts-dejavu-core tesseract-ocr
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "opendataloader-pdf[hybrid]"

      - name: Start Hybrid PDF Server & Run Financial Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_WEBAPP_URL: ${{ secrets.GDRIVE_WEBAPP_URL }}
          RECALCULATE_FRESH: ${{ github.event.inputs.recalculate_fresh }}
        run: |
          # Khởi động hybrid server ngầm — ép --ocr-lang vi (mặc định trước đây không đặt ngôn ngữ,
          # khiến easyocr đọc theo model tiếng Anh, làm rụng dấu tiếng Việt nhiều — xem
          # .opencode/skills/thep/changelog.md mục OCR đa mảng). Không dùng --force-ocr (đã gây
          # segfault khi kết hợp nhiều ngôn ngữ cùng lúc trong môi trường test) và không dùng đa ngôn
          # ngữ "vi,en" (cùng nguyên nhân crash) — chỉ "vi" đơn ngôn ngữ đã verify ổn định.
          # DocumentConverter cần ~15-20s để khởi tạo model, sleep 5s cũ có rủi ro race condition.
          opendataloader-pdf-hybrid --port 5002 --ocr-lang vi &
          sleep 20
          python run_analysis.py "${{ github.event.inputs.ticker }}"

      - name: Commit Generated Files Back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage: auto-generated builder script + data JSON
          TICKER="${{ github.event.inputs.ticker }}"
          BUILDER="build_${TICKER,,}_model.py"
          
          git add data/ || true
          git add "$BUILDER" 2>/dev/null || true
          # "Bao cao/<TICKER>/" (Excel/PDF/chart PNG) đã được track sẵn trong git từ trước (không phải
          # file mới) — nếu không stage ở đây, lần chạy nào ghi đè các file này cũng để lại thay đổi
          # CHƯA stage trên working tree, khiến `git rebase origin/master` bên dưới báo lỗi "cannot
          # rebase: you have unstaged changes" và toàn bộ kết quả phân tích bị mất (không commit/push
          # được) dù python run_analysis.py đã chạy thành công. Dùng ${TICKER^^} vì thư mục output luôn
          # là ticker viết HOA (template_*.py tự .upper()), bất kể input gõ hoa/thường.
          git add "Bao cao/${TICKER^^}/" 2>/dev/null || true
          
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-analysis: ${{ github.event.inputs.ticker }} — $(date +'%Y-%m-%d')"

            # Job chạy lâu (OCR có thể mất 40-60 phút) → trong lúc chờ, master trên remote có thể
            # đã có commit khác được push (vd. từ máy dev). Push thẳng sẽ bị reject
            # (non-fast-forward) và toàn bộ kết quả phân tích sẽ mất. Rebase lên remote rồi push,
            # thử lại vài lần để chịu được trường hợp remote tiếp tục đổi giữa lúc rebase và push.
            PUSHED=0
            for i in 1 2 3 4 5; do
              git fetch origin master
              if git rebase origin/master; then
                if git push origin HEAD:master; then
                  PUSHED=1
                  break
                fi
              else
                git rebase --abort
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done

            if [ "$PUSHED" = "1" ]; then
              echo "Changes committed and pushed."
            else
              echo "::error::Could not push analysis results after 5 attempts (remote kept diverging)."
              exit 1
            fi
          fi
