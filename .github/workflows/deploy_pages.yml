name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_run:
    workflows: ["Stock Analysis and Report Pipeline"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create Artifact Directory
        run: |
          mkdir -p _site
          cp -r data _site/
          cp *.html _site/ || true
          cp *.js _site/ || true
          cp *.css _site/ || true
          cp *.png _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
