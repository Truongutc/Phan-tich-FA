name: Cập nhật mật khẩu truy cập Drive

on:
  workflow_dispatch:
    inputs:
      new_password:
        description: 'Mật khẩu mới để khoá truy cập file PDF/Excel/Drive trên web'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-password:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update password in access-gate.js
        env:
          NEW_PASSWORD: ${{ github.event.inputs.new_password }}
        run: |
          python3 - << 'PYEOF'
          import os, re

          new_pwd = os.environ["NEW_PASSWORD"]
          path = "access-gate.js"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          escaped = new_pwd.replace("\\", "\\\\").replace("'", "\\'")
          new_content, n = re.subn(
              r"const DRIVE_ACCESS_PASSWORD = '.*?'; // SYS_PWD_DRIVE",
              f"const DRIVE_ACCESS_PASSWORD = '{escaped}'; // SYS_PWD_DRIVE",
              content,
          )
          if n != 1:
              raise SystemExit(f"Khong tim thay dung 1 dong SYS_PWD_DRIVE de thay (tim thay {n})")

          with open(path, "w", encoding="utf-8") as f:
              f.write(new_content)
          print("Da cap nhat mat khau trong access-gate.js")
          PYEOF

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add access-gate.js
          if git diff --staged --quiet; then
            echo "Khong co thay doi."
          else
            git commit -m "Update Drive access password"
            git push
          fi
