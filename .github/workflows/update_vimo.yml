name: Cập nhật Vĩ mô Việt Nam

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-vimo:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch dữ liệu vĩ mô mới nhất (World Bank/IMF/FRED/FX/NSO)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_macro_data.py

      - name: Tính toán Scorecard + Tổng hợp phân tích AI + xuất PDF/JSON
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from template_vimo import run_vimo_analysis; run_vimo_analysis()"

      - name: Upload PDF lên Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_WEBAPP_URL: ${{ secrets.GDRIVE_WEBAPP_URL }}
        run: |
          python3 - << 'PYEOF'
          import glob
          import json
          import os

          import google_drive_uploader

          pdfs = sorted(glob.glob("Bao cao/VIMO/*.pdf"))
          if not pdfs:
              print("[WARN] Không tìm thấy PDF vĩ mô, bỏ qua upload.")
          else:
              pdf_path = pdfs[-1]
              _, pdf_url = google_drive_uploader.upload_file(pdf_path, sector="Vĩ mô", ticker="VIMO")
              json_path = "data/vimo.json"
              if pdf_url and os.path.exists(json_path):
                  with open(json_path, "r", encoding="utf-8") as f:
                      data = json.load(f)
                  data["gdrivePdfUrl"] = pdf_url
                  with open(json_path, "w", encoding="utf-8") as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print(f"[OK] Đã gắn gdrivePdfUrl vào data/vimo.json: {pdf_url}")
          PYEOF

      - name: Commit và push kết quả
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data/vimo_raw.json data/vimo.json "Bao cao/VIMO/" 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Không có thay đổi để commit."
          else
            git commit -m "Auto-update: Vĩ mô Việt Nam — $(date +'%Y-%m-%d')"

            PUSHED=0
            for i in 1 2 3 4 5; do
              git fetch origin master
              if git rebase origin/master; then
                if git push origin HEAD:master; then
                  PUSHED=1
                  break
                fi
              else
                git rebase --abort
              fi
              echo "Push attempt $i failed, retrying..."
              sleep 10
            done

            if [ "$PUSHED" != "1" ]; then
              echo "::error::Could not push vĩ mô update after 5 attempts (remote kept diverging)."
              exit 1
            fi
          fi

      # QUAN TRỌNG: push tạo bởi GITHUB_TOKEN mặc định KHÔNG kích hoạt các workflow "on: push"
      # khác (chống lặp vô hạn của GitHub) — gọi thẳng deploy_pages.yml để site GitHub Pages có
      # data/vimo.json mới ngay, không phải đợi lần push kế tiếp từ máy dev.
      - name: Trigger GitHub Pages redeploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy_pages.yml --ref ${{ github.ref_name }}
