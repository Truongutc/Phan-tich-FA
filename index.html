<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIC FA System — Hệ thống Phân Tích Cơ Bản Chuyên Sâu</title>
    <meta name="description" content="Hệ thống báo cáo và phân tích tài chính doanh nghiệp tự động hóa theo nhóm ngành">

    <link rel="icon" type="image/png" href="app_icon.png">
    <link rel="shortcut icon" type="image/png" href="app_icon.png">
    <link rel="apple-touch-icon" href="app_icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">

    <!-- TOP NAVBAR -->
    <header class="top-navbar">
        <button class="logo-btn" onclick="location.href='index.html'" title="Trang chủ">
            <img src="logoaic.png" alt="AIC Logo" class="logo-img">
            <div class="logo-text">
                <span class="logo-title">AIC FA SYSTEM</span>
                <span class="logo-sub">Hệ thống Phân Tích Cơ Bản</span>
            </div>
        </button>
        <div class="nav-breadcrumb" id="nav-breadcrumb">
            <span class="breadcrumb-home">Tổng quan</span>
        </div>
    </header>

    <!-- VIEW: OVERVIEW (stock grid) -->
    <main id="view-overview" class="view view-overview" style="display:flex">

        <div class="overview-hero card">
            <div class="hero-content">
                <div class="hero-icon">📊</div>
                <h2>AIC FA System — Phân Tích Cơ Bản Chuyên Sâu</h2>
                <p>Chọn mã cổ phiếu để xem dashboard chuyên sâu theo đúng nhóm ngành.</p>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px">
                    <a href="https://drive.google.com/drive/folders/1cDNkx6L806mgws_CbPve-ZfSKfvEwhdk?usp=sharing"
                       target="_blank" class="btn btn-secondary">📁 Google Drive ↗</a>
                </div>
            </div>
        </div>

        <div class="search-bar-wrap">
            <div class="search-bar card">
                <span class="search-icon">🔍</span>
                <input type="text" id="stock-search-input" placeholder="Tìm kiếm mã cổ phiếu hoặc tên công ty..." autocomplete="off">
                <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
            </div>
        </div>

        <div id="sector-groups-container">
            <div class="loading-state card">
                <span>Đang tải danh sách cổ phiếu...</span>
            </div>
        </div>

    </main>

</div>

<script>
'use strict';

const SECTOR_PAGES = {
    banks: 'banking.html',
    materials: 'steel.html',
    retail: 'retail.html',
    securities: 'securities.html',
    other: 'index.html',
};

async function loadStockList() {
    try {
        const r = await fetch('data/index.json');
        if (!r.ok) return [];
        return await r.json();
    } catch(e) {
        return [];
    }
}

function getSectorKey(s) {
    const v = (s || '').toLowerCase();
    if (v.includes('bank') || v.includes('financial') || v.includes('ngân hàng') || v.includes('ngan hang')) return 'banks';
    if (v.includes('basic resource') || v.includes('material') || v.includes('steel') || v.includes('thép') || v.includes('th\u00e9p')) return 'materials';
    if (v.includes('bán lẻ') || v.includes('ban le') || v.includes('retail') || v.includes('consumer discretionary')) return 'retail';
    if (v.includes('chứng khoán') || v.includes('chung khoan') || v.includes('securities')) return 'securities';
    return 'other';
}

const SECTOR_CFG = {
    banks:  { label: 'Ngân Hàng',           icon: '🏦', color: '#3b82f6' },
    materials: { label: 'Thép & Vật Liệu',   icon: '🔩', color: '#f97316' },
    retail: { label: 'Bán Lẻ',              icon: '🛒', color: '#8b5cf6' },
    securities: { label: 'Chứng Khoán',     icon: '📈', color: '#0ea5e9' },
    other:  { label: 'Ngành Khác',          icon: '📁', color: '#a0aec0' },
};

function groupAndRender(stocks) {
    const groups = {};
    stocks.forEach(s => {
        const k = getSectorKey(s.sector);
        if (!groups[k]) groups[k] = [];
        groups[k].push(s);
    });
    const container = document.getElementById('sector-groups-container');
    container.innerHTML = '';
    const order = ['banks', 'materials', 'retail', 'securities', 'other'];
    order.forEach(key => {
        if (!groups[key]) return;
        const cfg = SECTOR_CFG[key] || { label: 'Khác', icon: '📁', color: '#a0aec0' };
        const div = document.createElement('div');
        div.className = 'card sector-group';
        div.innerHTML = `
            <div class="sector-group-header">
                <div class="sector-group-dot" style="background:${cfg.color}"></div>
                <h3 style="color:${cfg.color}">${cfg.icon} ${cfg.label}</h3>
                <span class="sector-count-badge">${groups[key].length} mã</span>
            </div>
            <div class="stocks-grid" id="grid-${key}"></div>
        `;
        container.appendChild(div);
        const grid = div.querySelector(`#grid-${key}`);
        groups[key].forEach(s => {
            const card = document.createElement('div');
            card.className = 'stock-card';
            card.style.setProperty('--sector-color', cfg.color);
            card.innerHTML = `<div class="stock-card-ticker" style="color:${cfg.color}">${s.ticker}</div>`;
            const page = SECTOR_PAGES[key] || 'index.html';
            card.onclick = () => { location.href = `${page}?ticker=${s.ticker}`; };
            grid.appendChild(card);
        });
    });
}

function clearSearch() {
    const inp = document.getElementById('stock-search-input');
    if (inp) inp.value = '';
    document.getElementById('search-clear').style.opacity = '0';
    if (window._allStocks) groupAndRender(window._allStocks);
}

(async () => {
    const stocks = await loadStockList();
    window._allStocks = stocks;
    if (stocks.length === 0) {
        document.getElementById('sector-groups-container').innerHTML =
            '<div class="loading-state card">Chưa có dữ liệu. Hãy chạy phân tích ít nhất một mã cổ phiếu.</div>';
        return;
    }
    groupAndRender(stocks);
    const inp = document.getElementById('stock-search-input');
    if (inp) {
        inp.addEventListener('input', () => {
            const q = inp.value.trim().toLowerCase();
            document.getElementById('search-clear').style.opacity = q ? '1' : '0';
            if (!q) { groupAndRender(window._allStocks); return; }
            const filtered = window._allStocks.filter(s =>
                s.ticker.toLowerCase().includes(q) || (s.companyName || '').toLowerCase().includes(q)
            );
            const container = document.getElementById('sector-groups-container');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="loading-state card">Không tìm thấy mã nào khớp với "${q}"</div>`;
                return;
            }
            container.innerHTML = '';
            const card = document.createElement('div');
            card.className = 'card sector-group';
            card.innerHTML = `
                <div class="sector-group-header">
                    <h3 style="color:var(--text-muted)">🔍 Kết quả tìm kiếm</h3>
                    <span class="sector-count-badge">${filtered.length} mã</span>
                </div>
                <div class="stocks-grid" id="grid-search"></div>
            `;
            container.appendChild(card);
            const grid = card.querySelector('#grid-search');
            filtered.forEach(s => {
                const k = getSectorKey(s.sector);
                const cfg = SECTOR_CFG[k] || { icon: '📁', color: '#a0aec0' };
                const c2 = document.createElement('div');
                c2.className = 'stock-card';
                c2.style.setProperty('--sector-color', cfg.color);
                c2.innerHTML = `<div class="stock-card-ticker" style="color:${cfg.color}">${s.ticker}</div>`;
                const page = SECTOR_PAGES[k] || 'index.html';
                c2.onclick = () => { location.href = `${page}?ticker=${s.ticker}`; };
                grid.appendChild(c2);
            });
        });
    }
})();
</script>

</body>
</html>
